---
# Required extra vars:
#   pool   - pool name to export
- name: Export ZFS pool
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate input
      ansible.builtin.assert:
        that:
          - pool is defined and pool is match("^[a-zA-Z][a-zA-Z0-9_.:-]*$")
        fail_msg: "pool must be a valid pool name"

    - name: Export pool
      ansible.builtin.command:
        argv:
          - zpool
          - export
          - "{{ pool }}"
      register: export_result
      changed_when: export_result.rc == 0
