---
# Required extra vars:
#   snapshots_json - JSON-encoded list of full snapshot names (e.g. '["tank/data@snap1","tank/home@snap2"]')
#                   Each entry must contain '@'.
#
# Per-item failures (e.g. "dataset is busy" from a stale hold, or a snapshot
# that no longer exists) do not abort the batch — every item is attempted and
# any failures are aggregated into a single failure at the end. One bad
# snapshot can't block deletion of the rest.
- name: Destroy multiple ZFS snapshots
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate input
      ansible.builtin.assert:
        that:
          - snapshots_json is defined and snapshots_json != ""
          - snapshots_json | from_json | length > 0
          - snapshots_json | from_json | select('search', '@') | list | length == snapshots_json | from_json | length
        fail_msg: "snapshots_json must be a non-empty JSON list of snapshot names containing '@'"

    - name: Destroy snapshot
      ansible.builtin.command:
        argv: ['zfs', 'destroy', '{{ item }}']
      loop: "{{ snapshots_json | from_json }}"
      register: destroy_result
      changed_when: destroy_result.rc == 0
      failed_when: false

    - name: Report failed items
      ansible.builtin.fail:
        msg: >-
          {{ destroy_result.results | selectattr('rc', 'ne', 0) | length }} of
          {{ destroy_result.results | length }} snapshot(s) failed to destroy:
          {% for r in destroy_result.results | selectattr('rc', 'ne', 0) %}
          {{ r.item }} ({{ r.stderr | trim }}){% if not loop.last %}; {% endif %}
          {% endfor %}
      when: destroy_result.results | selectattr('rc', 'ne', 0) | list | length > 0
