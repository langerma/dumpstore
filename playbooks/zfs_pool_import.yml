---
# Required extra vars:
#   pool   - pool name to import
# Optional extra vars:
#   force  - "true" to pass -f (pool from another system / unclean export)
- name: Import ZFS pool
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate input
      ansible.builtin.assert:
        that:
          - pool is defined and pool is match("^[a-zA-Z][a-zA-Z0-9_.:-]*$")
        fail_msg: "pool must be a valid pool name"

    - name: Import pool
      ansible.builtin.command:
        argv: "{{ ['zpool', 'import'] + (['-f'] if (force | default('false')) | bool else []) + [pool] }}"
      register: import_result
      changed_when: import_result.rc == 0
