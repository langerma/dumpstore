---
# Required extra vars:
#   pool      - pool name (e.g. tank)
#   kind      - data | cache | log | spare
#   devices   - space-separated device paths (e.g. "/dev/sdb /dev/sdc")
# Optional extra vars:
#   vdev_type - for kind=data: single | mirror | raidz1 | raidz2 | raidz3
#               for kind=log: mirror (to mirror the log devices)
- name: Add devices to a ZFS pool
  hosts: localhost
  gather_facts: false
  vars:
    device_list: "{{ devices | default('') | split }}"
    # data vdevs take an optional topology keyword; cache/log/spare use the
    # zpool class keyword, with log additionally allowing a mirror keyword.
    add_argv: >-
      {{ ['zpool', 'add', pool]
         + ({'data':  ([] if (vdev_type | default('single')) == 'single' else [vdev_type]),
             'cache': ['cache'],
             'log':   ['log'] + (['mirror'] if (vdev_type | default('')) == 'mirror' else []),
             'spare': ['spare']}[kind])
         + device_list }}
  tasks:
    - name: Validate input
      ansible.builtin.assert:
        that:
          - pool is defined and pool is match("^[a-zA-Z][a-zA-Z0-9_.:-]*$")
          - kind is defined and kind in ['data', 'cache', 'log', 'spare']
          - device_list | length > 0
          - device_list | select('match', '^/?[a-zA-Z0-9][a-zA-Z0-9/_.:-]*$') | list | length == device_list | length
          - (vdev_type | default('')) == '' or vdev_type in ['single', 'mirror', 'raidz1', 'raidz2', 'raidz3']
        fail_msg: "pool, kind (data|cache|log|spare) and devices must be valid"

    - name: Add devices
      ansible.builtin.command:
        argv: "{{ add_argv }}"
      register: add_result
      changed_when: add_result.rc == 0
