---
# Required extra vars:
#   name      - full dataset path (e.g. tank/data) — must NOT contain '@'
# Optional:
#   recursive - "true" to also destroy all child datasets and snapshots
- name: Destroy ZFS dataset
  hosts: localhost
  gather_facts: false
  vars:
    recursive: "false"
  tasks:
    - name: validate input
      ansible.builtin.assert:
        that:
          - name is defined and name != ""
          - name is not search("@")
          - name is search("/")
        fail_msg: >-
          name is required, must not contain '@' (use snapshot destroy for snapshots),
          and must include a pool prefix (refusing to destroy a pool root)

    - name: unmount dataset
      ansible.builtin.command:
        argv: "{{ ['zfs', 'unmount'] + (['-r'] if recursive | bool else []) + [name] }}"
      failed_when: false
      changed_when: false

    - name: destroy dataset
      ansible.builtin.command:
        argv: "{{ ['zfs', 'destroy'] + (['-r'] if recursive | bool else []) + [name] }}"
      register: destroy_result
      changed_when: destroy_result.rc == 0
