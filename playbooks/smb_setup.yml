---
# Configures Samba for ZFS integration on Linux. Idempotent — safe to run
# multiple times. Performs:
#   1. Creates the usershares directory and sambashare group so that
#      `zfs set sharesmb=<name>` can call `net usershare` for custom share names.
#   2. Adds PAM passthrough options so SMB logins are checked against Linux PAM
#      and password changes sync between Samba and the Linux account.
#   3. Restarts smbd/nmbd to apply changes.

- name: Configure Samba for ZFS integration
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check smb.conf exists
      ansible.builtin.stat:
        path: /etc/samba/smb.conf
      register: smb_conf_stat

    - name: Fail if smb.conf not found
      ansible.builtin.fail:
        msg: "/etc/samba/smb.conf not found — is Samba installed?"
      when: not smb_conf_stat.stat.exists

    # ── usershares setup ──────────────────────────────────────────────────────

    - name: Ensure sambashare group exists
      ansible.builtin.group:
        name: sambashare
        state: present

    - name: Create usershares directory
      ansible.builtin.file:
        path: /var/lib/samba/usershares
        state: directory
        owner: root
        group: sambashare
        mode: "1770"

    - name: Set usershare path
      ansible.builtin.lineinfile:
        path: /etc/samba/smb.conf
        regexp: '^\s*usershare path\s*='
        line: '   usershare path = /var/lib/samba/usershares'
        insertafter: '^\[global\]'
      notify: Restart samba

    - name: Set usershare max shares
      ansible.builtin.lineinfile:
        path: /etc/samba/smb.conf
        regexp: '^\s*usershare max shares\s*='
        line: '   usershare max shares = 100'
        insertafter: '^\[global\]'
      notify: Restart samba

    - name: Disable usershare guest access
      ansible.builtin.lineinfile:
        path: /etc/samba/smb.conf
        regexp: '^\s*usershare allow guests\s*='
        line: '   usershare allow guests = no'
        insertafter: '^\[global\]'
      notify: Restart samba

    - name: Allow root to manage shares for any path
      ansible.builtin.lineinfile:
        path: /etc/samba/smb.conf
        regexp: '^\s*usershare owner only\s*='
        line: '   usershare owner only = no'
        insertafter: '^\[global\]'
      notify: Restart samba

    - name: Remove [homes] section (home dirs must not be shared by default)
      ansible.builtin.replace:
        path: /etc/samba/smb.conf
        regexp: '(?m)^\[homes\][^\[]*'
        replace: ''
      notify: Restart samba

    # ── PAM passthrough ───────────────────────────────────────────────────────

    - name: Set obey pam restrictions
      ansible.builtin.lineinfile:
        path: /etc/samba/smb.conf
        regexp: '^\s*obey pam restrictions\s*='
        line: '   obey pam restrictions = yes'
        insertafter: '^\[global\]'
      notify: Restart samba

    - name: Set pam password change
      ansible.builtin.lineinfile:
        path: /etc/samba/smb.conf
        regexp: '^\s*pam password change\s*='
        line: '   pam password change = yes'
        insertafter: '^\[global\]'
      notify: Restart samba

    - name: Set unix password sync
      ansible.builtin.lineinfile:
        path: /etc/samba/smb.conf
        regexp: '^\s*unix password sync\s*='
        line: '   unix password sync = yes'
        insertafter: '^\[global\]'
      notify: Restart samba

  handlers:
    - name: Restart samba
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
      loop:
        - smbd
        - nmbd
      failed_when: false
